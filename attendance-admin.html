<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropNex Attendance Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <div class="bg-layer" aria-hidden="true">
        <canvas id="candleCanvas"></canvas>
        <div class="vignette"></div>
    </div>
    <div class="deco-line top-left"></div>
    <div class="deco-line bottom-right"></div>

    <main class="page-shell admin-shell">
        <header class="hero">
            <div class="hero-mark">&#10022;</div>
            <p class="eyebrow">Admin / Testing</p>
            <h1>Attendance Reset</h1>
            <p class="hero-copy">Use this page to clear browser-saved attendance records during testing. This does not delete rows from Google Sheets.</p>
            <div class="hero-divider"><span></span><span class="hero-dot">&#9670;</span><span></span></div>
        </header>

        <section class="admin-panel admin-panel-page">
            <div class="panel-card panel-card-search">
                <h2>Local Attendance Reset</h2>
                <p class="panel-copy">Reset one guest or clear all browser-stored attendance records for testing on this device.</p>

                <div class="admin-body admin-body-page">
                    <div class="admin-row">
                        <input
                            id="adminGuestInput"
                            type="text"
                            class="admin-input"
                            placeholder="Guest name to reset"
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button type="button" id="adminResetGuestButton" class="secondary-btn">Reset Guest</button>
                    </div>

                    <div class="admin-row admin-row-single">
                        <button type="button" id="adminResetAllButton" class="secondary-btn">Reset All Local Attendance</button>
                    </div>

                    <p id="adminStatusText" class="admin-status"></p>
                </div>

                <div class="button-row button-row-single admin-nav">
                    <a href="index.html" class="secondary-btn admin-link-btn">Back To Seat Finder</a>
                </div>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
